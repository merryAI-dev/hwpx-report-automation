app = "hwpx-report"
primary_region = "nrt"

[build]

[env]
  NODE_ENV = "production"
  DATABASE_URL = "file:/data/prod.db"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "hwpx_data"
  destination = "/data"
