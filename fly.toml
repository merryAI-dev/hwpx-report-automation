# fly.toml — hwpx-report-automation
# Docs: https://fly.io/docs/reference/configuration/

app = "hwpx-report"
primary_region = "nrt"  # Tokyo — closest to Korea

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  NEXT_TELEMETRY_DISABLED = "1"
  BLOB_STORAGE_DRIVER = "fs"
  BLOB_STORAGE_FS_ROOT = "/data/blob-storage"
  PORT = "3000"
  HOSTNAME = "0.0.0.0"

[[services]]
  internal_port = 3000
  protocol = "tcp"
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [services.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"

[mounts]
  source = "hwpx_data"
  destination = "/data/blob-storage"
