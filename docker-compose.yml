version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
      - BLOB_STORAGE_DRIVER=fs
      - BLOB_STORAGE_FS_ROOT=/data/blob-storage
    volumes:
      - blob_data:/data/blob-storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  blob_data:
    driver: local
